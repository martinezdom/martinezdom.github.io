s="sr-only">Dark</span> <span class="size-6"> <svg width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"> <path stroke="none" d="M0 0h24v24H0z" fill="none"></path> <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313 -12.454z"></path> </svg> </span> </button><button class="theme-option rounded-full flex items-center justify-center size-11 border-2 border-gray-900 dark:border-white text-gray-900 dark:text-white bg-white dark:bg-gray-900 hover:bg-gray-900 hover:text-white hover:dark:bg-white hover:dark:text-gray-900 transition-all duration-300 cursor-pointer" data-theme="system" role="menuitem" aria-label="System" title="System"> <span class="sr-only">System</span> <span class="size-6"> <svg width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"> <path stroke="none" d="M0 0h24v24H0z" fill="none"></path> <path d="M3 5a1 1 0 0 1 1 -1h16a1 1 0 0 1 1 1v10a1 1 0 0 1 -1 1h-16a1 1 0 0 1 -1 -1v-10z"></path> <path d="M7 20h10"></path> <path d="M9 16v4"></path> <path d="M15 16v4"></path> </svg> </span> </button> </div> </div> <script>
  const themeToggle = document.getElementById('theme-toggle');
  const themeMenu = document.getElementById('theme-menu');
  const themeIcons = document.querySelectorAll('.theme-main-icon');
  const themeOptions = document.querySelectorAll('.theme-option');
  const colorScheme = window.matchMedia('(prefers-color-scheme: dark)');

  const getSavedTheme = () => {
    const saved = localStorage.getItem('theme');
    return ['light', 'dark', 'system'].includes(saved) ? saved : 'system';
  };

  const updateActiveIcon = (theme) => {
    themeIcons.forEach(icon => {
      const isActive = icon.id === theme;
      icon.classList.toggle('opacity-100', isActive);
      icon.classList.toggle('opacity-0', !isActive);
    });
  };

  const applyTheme = () => {
    const theme = getSavedTheme();
    const isDark = theme === 'dark' || (theme === 'system' && colorScheme.matches);
    
    document.documentElement.classList.toggle('dark', isDark);
    updateActiveIcon(theme);
  };

  const setToggleState = (isActive) => {
    themeToggle.classList.toggle('bg-gray-900', isActive);
    themeToggle.classList.toggle('text-white', isActive);
    themeToggle.classList.toggle('dark:bg-white', isActive);
    themeToggle.classList.toggle('dark:text-gray-900', isActive);
    themeToggle.classList.toggle('bg-white', !isActive);
    themeToggle.classList.toggle('text-gray-900', !isActive);
    themeToggle.classList.toggle('dark:bg-gray-900', !isActive);
    themeToggle.classList.toggle('dark:text-white', !isActive);
  };

  const toggleMenu = () => {
    const isOpen = themeToggle.getAttribute('aria-expanded') === 'true';
    
    themeMenu.classList.toggle('hidden', isOpen);
    themeToggle.setAttribute('aria-expanded', !isOpen);
    setToggleState(!isOpen);
  };

  const closeMenu = () => {
    themeMenu.classList.add('hidden');
    themeToggle.setAttribute('aria-expanded', 'false');
    setToggleState(false);
  };

  const changeTheme = (theme) => {
    localStorage.setItem('theme', theme);
    applyTheme();
    closeMenu();
  };

  themeToggle.addEventListener('click', (e) => {
    e.stopPropagation();
    toggleMenu();
  });

  document.addEventListener('click', (e) => {
    if (!themeToggle.contains(e.target) && !themeMenu.contains(e.target)) {
      closeMenu();
    }
  });

  themeOptions.forEach(option => {
    option.addEventListener('click', () => {
      changeTheme(option.dataset.theme);
    });
  });

  colorScheme.addEventListener('change', applyTheme);
  document.addEventListener('astro:after-swap', applyTheme);

  applyTheme();
</script> </main>  <footer>
